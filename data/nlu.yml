version: "3.1"

nlu:
  - intent: saludar
    examples: |
      - hola
      - buenos días
      - buenas tardes
      - hey
      - qué tal

  - intent: solicitar_servicio
    examples: |
      - quiero una lavadora [grande](tamano) de [12 horas](hora)
      - quiero una lavadora [mediana](tamano) de [24 horas](hora)
      - quiero una lavadora [pequeña](tamano) de [12 horas](hora)
      - deseo una lavadora [grande](tamano) de [36 horas](hora)
      - pídeme una lavadora [mediana](tamano) de [24 horas](hora)
      - necesito una lavadora [pequeña](tamano) de [12 horas](hora)
      - quiero pedir una lavadora [grande](tamano) de [24 horas](hora)
      - una lavadora [pequeña](tamano) de [12 horas](hora)
      - lavadora [mediana](tamano) de [24 horas](hora)
      - lavadora [grande](tamano) de [12 horas](hora)

  - intent: confirmar_envio
    examples: |
      - confirmar pedido
      - confirmo el pedido
      - sí, confirma el pedido
      - confirma mi lavadora
      - está bien, confirma
      - correcto, confirma el pedido
      - sí, esa lavadora está bien
      - listo, confirmar
      - ok, confirma
      - confirma
      - confirmar servicio a [pajonal](direccion)
      - confirmar el pedido a [la esmeralda](direccion)

  - intent: consultar_precios
    examples: |
      - qué lavadoras tienen
      - muéstrame el menú de precios
      - cuál es el catálogo de precios
      - qué tamaños hay
      - tienen lavadora de 12 Kg

  - intent: pago
    examples: |
      - cuanto es el costo por la lavadora [mediana](tamano) 
      - cuanto es el costo por la lavadora [grande](tamano)
      - quiero pagar mi pedido de lavadora
      - cuanto seria el costo de mi pedido
      - voy a pagar

  - intent: despedirse
    examples: |
      - adiós
      - hasta luego
      - gracias
      - chao
      - nos vemos

  # --- INTENCIONES SOPORTE DE LAVANDERÍA ---
  - intent: estado
    examples: |
      - ¿Cómo va mi pedido?
      - Quiero saber si ya traen la lavadora
      - ya salio la lavadora
      - estado de mi pedido

  - intent: disponibilidad
    examples: |
      - ¿tienen lavadoras disponibles para hoy?
      - ¿les queda alguna lavadora?
      - ¿hay disponibilidad ahorita?
      - quiero saber si tienen lavadoras disponibles

  - intent: reportar_falla
    examples: |
      - la lavadora no funciona
      - la máquina bota agua
      - la lavadora se detuvo
      - me mandaron una lavadora mala

  - intent: solicitar_recoleccion
    examples: |
      - ya terminé de usarla, pueden venir a recogerla
      - por favor recoger la lavadora
      - ¿a qué hora pasan a recoger la lavadora?

  - intent: cancelar_servicio
    examples: |
      - quiero cancelar mi pedido
      - ya no necesito la lavadora, gracias
      - cancela el envío por favor

  # --- SINÓNIMOS ---
  - synonym: pepperoni
    examples: |
      - peperoni
      - peperonni

  - synonym: pequeña
    examples: |
      - pequena
      - chica
      - 8 Kg

  - synonym: mediana
    examples: |
      - 12 Kg

  - synonym: grande
    examples: |
      - 36 Kg

  - synonym: costo
    examples: |
      - pago
      - pagar
      - precio